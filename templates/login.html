<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMS &middot; LPU</title>
<style>
:root {
  --bg: oklch(0.975 0.004 55);
  --surface: oklch(0.995 0.002 55);
  --border: oklch(0.90 0.004 55);
  --text: oklch(0.22 0.005 55);
  --text-dim: oklch(0.50 0.005 55);
  --accent: oklch(0.48 0.14 55);
  --accent-soft: oklch(0.92 0.025 55);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.login-wrap {
  width: 380px; max-width: 94vw; padding: 40px;
}
.logo-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
}
.logo-mark {
  width: 36px; height: 36px; background: var(--accent); border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; color: var(--surface);
}
.logo-label {
  font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
}
.logo-sub {
  font-size: 11px; color: var(--text-dim); margin-top: 1px;
}
h1 {
  font-size: 22px; font-weight: 600; margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.subtitle {
  font-size: 13px; color: var(--text-dim); margin-bottom: 28px;
  line-height: 1.5;
}
.field { margin-bottom: 16px; }
label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text-dim); margin-bottom: 5px;
}
input[type="text"], input[type="password"] {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 14px; font-family: inherit;
  background: var(--surface); color: var(--text);
  outline: none; transition: border-color 0.15s ease;
  -webkit-appearance: none;
}
input:focus { border-color: var(--accent); }
.btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: var(--accent); color: var(--surface); font-size: 14px;
  font-weight: 600; cursor: pointer; font-family: inherit;
  transition: opacity 0.15s ease; margin-top: 6px;
}
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.35; cursor: default; }
.error {
  background: oklch(0.94 0.02 25); border: 1px solid oklch(0.52 0.12 25);
  color: oklch(0.52 0.12 25); padding: 10px 14px; border-radius: 10px;
  font-size: 12px; margin-bottom: 16px; display: none;
}
.footer {
  margin-top: 24px; text-align: center; font-size: 11px;
  color: var(--text-dim);
}
.loading { display: none; margin-top: 12px; text-align: center; font-size: 12px; color: var(--text-dim); }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 18px; height: 18px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle;
  margin-right: 6px;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-row">
    <div class="logo-mark">U</div>
    <div><div class="logo-label">UMS</div><div class="logo-sub">LPU</div></div>
  </div>
  <h1>Sign in</h1>
  <div class="subtitle">Enter your UMS credentials to continue.</div>
  <div class="error" id="error"></div>
  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label for="userid">User ID</label>
      <input type="text" id="userid" name="userid" placeholder="e.g. 12345678" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
    </div>
    <button class="btn" id="submitBtn">Sign in</button>
    <div class="loading" id="loading"><span class="spinner"></span> Signing in&hellip;</div>
  </form>
  <div class="footer">Lovely Professional University</div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const uid = document.getElementById('userid').value.trim();
  const pwd = document.getElementById('password').value;
  const errEl = document.getElementById('error');
  const btn = document.getElementById('submitBtn');
  const loading = document.getElementById('loading');

  errEl.style.display = 'none';
  if (!uid || !pwd) { errEl.textContent = 'Enter your User ID and password.'; errEl.style.display = 'block'; return; }

  btn.disabled = true; loading.style.display = 'block';

  try {
    const resp = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userid: uid, password: pwd }),
    });
    const text = await resp.text();
    let d;
    try {
      d = JSON.parse(text);
    } catch(e) {
      throw new Error(resp.ok ? 'Server returned an invalid response.' : 'Server error. Check the terminal for details.');
    }
    if (d.ok) { window.location.href = '/dashboard'; }
    else { errEl.textContent = d.error || 'Login failed.'; errEl.style.display = 'block'; }
  } catch(e) { errEl.textContent = e.message || 'Connection error.'; errEl.style.display = 'block'; }
  finally { btn.disabled = false; loading.style.display = 'none'; }
});
</script>
</body>
</html>
